## Logstash pipeline:
##   Filebeat → enrich (GeoIP, MITRE mapping, threat-intel lookup) → ES
input {
  beats {
    port => 5044
    ssl  => true
    ssl_certificate            => "/etc/pki/logstash.crt"
    ssl_key                    => "/etc/pki/logstash.key"
    ssl_certificate_authorities => ["/etc/pki/ca.crt"]
    ssl_verify_mode            => "force_peer"
  }
}

filter {
  # Route by log type
  if [kubernetes][labels][app] == "threat-ingestion" {
    # Parse the structured JSON event payload
    if [event_payload][src_ip] {
      geoip { source => "[event_payload][src_ip]" target => "geoip" }
    }
    if [event_payload][mitre_technique] {
      mutate { add_field => { "[threat][mitre_id]" => "%{[event_payload][mitre_technique]}" } }
    }
    # Enrich with threat intelligence (reputation cache via memcached)
    memcached {
      hosts => ["threat-intel-cache:11211"]
      get   => { "%{[event_payload][src_ip]}" => "[threat][reputation]" }
    }
  }

  if [log][level] == "ERROR" or [log][level] == "CRITICAL" {
    mutate { add_tag => ["error","needs-investigation"] }
  }

  # Drop noisy health-check logs that slipped through
  if [url][path] in ["/healthz", "/readyz", "/metrics"] {
    drop {}
  }

  # PII scrub: strip authorization headers from request logs
  mutate { remove_field => ["[http][request][headers][authorization]","[http][request][headers][cookie]"] }
}

output {
  elasticsearch {
    hosts    => ["https://elasticsearch.sg-observability.svc:9200"]
    user     => "${LOGSTASH_USER}"
    password => "${LOGSTASH_PASSWORD}"
    cacert   => "/etc/pki/ca.crt"
    ilm_enabled       => true
    ilm_rollover_alias => "sg-app-logs"
    ilm_pattern       => "{now/d}-000001"
    ilm_policy        => "sg-app-logs-policy"
    index             => "sg-app-logs-write"
  }

  if "needs-investigation" in [tags] {
    # Fanout critical errors to a side index for SOC review
    elasticsearch {
      hosts => ["https://elasticsearch.sg-observability.svc:9200"]
      index => "sg-soc-events-%{+YYYY.MM.dd}"
    }
  }
}
