## Filebeat — one pod per node, ships container stdout/stderr to Logstash.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: filebeat
  namespace: sg-observability
  labels: { app: filebeat }
spec:
  selector: { matchLabels: { app: filebeat } }
  template:
    metadata: { labels: { app: filebeat } }
    spec:
      serviceAccountName: filebeat
      terminationGracePeriodSeconds: 30
      hostNetwork: false
      containers:
        - name: filebeat
          image: docker.elastic.co/beats/filebeat:8.15.0
          args: ["-c","/etc/filebeat.yml","-e"]
          env:
            - { name: NODE_NAME, valueFrom: { fieldRef: { fieldPath: spec.nodeName } } }
          securityContext:
            runAsUser: 0  # required to read /var/log/containers
            capabilities: { drop: ["ALL"], add: ["DAC_READ_SEARCH"] }
            readOnlyRootFilesystem: true
          resources: { requests: { cpu: "100m", memory: "200Mi" }, limits: { cpu: "500m", memory: "500Mi" } }
          volumeMounts:
            - { name: config,    mountPath: /etc/filebeat.yml, subPath: filebeat.yml, readOnly: true }
            - { name: varlog,    mountPath: /var/log,          readOnly: true }
            - { name: dockerlogs, mountPath: /var/lib/docker/containers, readOnly: true }
            - { name: data,      mountPath: /usr/share/filebeat/data }
      volumes:
        - { name: config,     configMap: { name: filebeat-config, defaultMode: 0640 } }
        - { name: varlog,     hostPath:  { path: /var/log } }
        - { name: dockerlogs, hostPath:  { path: /var/lib/docker/containers } }
        - { name: data,       hostPath:  { path: /var/lib/filebeat-data, type: DirectoryOrCreate } }
      tolerations:
        - { operator: Exists }
---
apiVersion: v1
kind: ConfigMap
metadata: { name: filebeat-config, namespace: sg-observability }
data:
  filebeat.yml: |
    filebeat.autodiscover:
      providers:
        - type: kubernetes
          node: ${NODE_NAME}
          hints.enabled: true
          templates:
            - condition.equals: { kubernetes.namespace: "sg-apps" }
              config:
                - type: container
                  paths: [ "/var/log/containers/*${data.kubernetes.container.id}.log" ]
                  processors:
                    - add_kubernetes_metadata: ~
                    - decode_json_fields: { fields: ["message"], target: "" , overwrite_keys: true }

    processors:
      - add_host_metadata: ~
      - add_cloud_metadata: ~
      - drop_event:
          when:
            or:
              - contains: { message: "kube-probe" }
              - equals:   { kubernetes.namespace: "kube-system" }

    output.logstash:
      hosts: ["logstash.sg-observability.svc:5044"]
      loadbalance: true
      ssl.enabled: true
      ssl.certificate_authorities: ["/etc/pki/ca.crt"]

    monitoring.enabled: true
