## Condensed manifests for the remaining five microservices.
## Same security posture as threat-ingestion (see threat-ingestion.yaml for the full template).

# ───────── threat-analysis (Kafka consumer; scales on consumer-group lag) ─────────
apiVersion: apps/v1
kind: Deployment
metadata: { name: threat-analysis, namespace: sg-apps, labels: { app: threat-analysis } }
spec:
  replicas: 4
  selector: { matchLabels: { app: threat-analysis } }
  template:
    metadata:
      labels: { app: threat-analysis }
      annotations: { prometheus.io/scrape: "true", prometheus.io/port: "8081" }
    spec:
      serviceAccountName: threat-analysis
      securityContext: { runAsNonRoot: true, runAsUser: 65532, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: app
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/sentinelgrid/threat-analysis:IMAGE_TAG
          ports: [{ containerPort: 8081 }]
          resources: { requests: { cpu: "1", memory: "2Gi" }, limits: { cpu: "4", memory: "8Gi" } }
          livenessProbe:  { httpGet: { path: /healthz, port: 8081 }, periodSeconds: 15 }
          readinessProbe: { httpGet: { path: /readyz,  port: 8081 }, periodSeconds: 5 }
          securityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
      nodeSelector: { role: ingest }
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata: { name: threat-analysis, namespace: sg-apps }
spec:
  scaleTargetRef: { name: threat-analysis }
  minReplicaCount: 4
  maxReplicaCount: 40
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: BOOTSTRAP_BROKERS
        consumerGroup: threat-analysis
        topic: raw-events
        lagThreshold: "5000"
---
# ───────── intel-distribution (Go, STIX/TAXII) ─────────
apiVersion: apps/v1
kind: Deployment
metadata: { name: intel-distribution, namespace: sg-apps, labels: { app: intel-distribution } }
spec:
  replicas: 4
  selector: { matchLabels: { app: intel-distribution } }
  template:
    metadata:
      labels: { app: intel-distribution }
      annotations: { prometheus.io/scrape: "true", prometheus.io/port: "8082" }
    spec:
      serviceAccountName: intel-distribution
      securityContext: { runAsNonRoot: true, runAsUser: 65532, seccompProfile: { type: RuntimeDefault } }
      containers:
        - name: app
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/sentinelgrid/intel-distribution:IMAGE_TAG
          ports: [{ containerPort: 8082 }]
          resources: { requests: { cpu: "250m", memory: "256Mi" }, limits: { cpu: "1", memory: "1Gi" } }
          livenessProbe:  { httpGet: { path: /healthz, port: 8082 } }
          readinessProbe: { httpGet: { path: /readyz,  port: 8082 } }
          securityContext: { allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: { drop: ["ALL"] } }
      nodeSelector: { role: app }
---
