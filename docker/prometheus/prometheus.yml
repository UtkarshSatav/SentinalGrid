# SentinelGrid — Prometheus scrape config for the local compose stack.
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: sentinelgrid-local
    region: local

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: threat-ingestion
    metrics_path: /metrics
    static_configs:
      - targets: ["threat-ingestion:8080"]

  - job_name: threat-analysis
    metrics_path: /metrics
    static_configs:
      - targets: ["threat-analysis:8081"]

  - job_name: intel-distribution
    metrics_path: /metrics
    static_configs:
      - targets: ["intel-distribution:8082"]

  - job_name: incident-coordination
    metrics_path: /metrics
    static_configs:
      - targets: ["incident-coordination:8083"]

  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["api-gateway:8001"]
